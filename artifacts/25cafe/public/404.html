<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>25 Cafe</title>
    <link rel="icon" type="image/svg+xml" href="/25-cafe/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="text/javascript">
      // Redirect to index.html with the current path as query parameter
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      if (path !== '/25-cafe/' && path !== '/25-cafe/index.html') {
        var redirectUrl = '/25-cafe/?/' + path.slice(8) + (search ? search.replace('?', '&') : '') + hash;
        window.location.replace(redirectUrl);
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Inter, sans-serif; background: #0d0d0d; color: #e2e2e2;">
        <h1 style="font-size: 3rem; margin-bottom: 1rem;">25 Cafe</h1>
        <p style="font-size: 1.2rem; text-align: center; max-width: 600px; margin-bottom: 2rem;">
          Přesměrování...
        </p>
        <div style="width: 40px; height: 40px; border: 3px solid #e2e2e2; border-top: 3px solid #f59e0b; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>
  </body>
</html>
