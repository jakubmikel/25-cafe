kind = "web"
previewPath = "/"
title = "25 Cafe"
version = "1.0.0"
id = "artifacts/25cafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21221

[services.development]
run = "pnpm --filter @workspace/25cafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/25cafe", "run", "build" ]
publicDir = "artifacts/25cafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21221"
BASE_PATH = "/"
